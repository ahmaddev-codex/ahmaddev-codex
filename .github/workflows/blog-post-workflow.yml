name: Update README with Engineering Blogs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🎧 Spotify
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://engineering.atspotify.com/feed/"
          max_post_count: 2
          template: "- **[$title]($url)** · $date$newline"
          date_format: "mmm dd, yyyy"
          readme_path: "README.md"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          comment_tag_name: "SPOTIFY-BLOG"

      - name: 🎬 Netflix
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://netflixtechblog.com/feed/"
          max_post_count: 2
          template: "- **[$title]($url)** · $date$newline"
          date_format: "mmm dd, yyyy"
          readme_path: "README.md"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          comment_tag_name: "NETFLIX-BLOG"

      - name: 🏠 Airbnb
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/airbnb-engineering"
          max_post_count: 2
          template: "- **[$title]($url)** · $date$newline"
          date_format: "mmm dd, yyyy"
          readme_path: "README.md"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          comment_tag_name: "AIRBNB-BLOG"

      - name: 📦 Dropbox
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dropbox.tech/feed"
          max_post_count: 2
          template: "- **[$title]($url)** · $date$newline"
          date_format: "mmm dd, yyyy"
          readme_path: "README.md"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          comment_tag_name: "DROPBOX-BLOG"
