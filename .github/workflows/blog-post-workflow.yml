name: Update README with Engineering Blogs

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  update-readme-with-blog:
    name: Update README with latest engineering blogs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://engineering.atspotify.com/feed/,https://netflixtechblog.com/feed/,https://medium.com/feed/airbnb-engineering,https://dropbox.tech/feed"
          max_post_count: 8
          template: "- $NEWLINE  **[$TITLE]($URL)**$NEWLINE  <sub>$DATE | $AUTHOR</sub>$NEWLINE"
          date_format: "MMM DD, YYYY"
          readme_path: "README.md"
          commit_message: "chore: update README with latest engineering blogs"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
